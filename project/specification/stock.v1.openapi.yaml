openapi: 3.1.0
info:
  title: "StockTr"
  description: Stock tracking and predicting
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.0
servers:
  - url: http://localhost:8090/v1
tags:
  - name: stock
paths:
  /stock/create:
    post:
      tags:
        - stock
      operationId: createStock
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStockRequest'
        required: true
      responses:
        200:
          description: Operation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateStockResponse'

  /stock/find:
    post:
      tags:
        - stock
      operationId: findStock
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FindStockRequest'
        required: true
      responses:
        200:
          description: Operation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindStockResponse'

  /stock/update:
    post:
      tags:
        - stock
      operationId: updateStock
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStockRequest'
        required: true
      responses:
        200:
          description: Operation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateStockResponse'

  /stock/delete:
    post:
      tags:
        - stock
      operationId: deleteStock
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteStockRequest'
        required: true
      responses:
        200:
          description: Operation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteStockResponse'

  /stock/search:
    post:
      tags:
        - stock
      operationId: searchStocks
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchStocksRequest'
        required: true
      responses:
        200:
          description: Operation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchStocksResponse'

components:
  schemas:
    UserId:
      type: string

    Error:
      type: object
      properties:
        code:
          type: string
        group:
          type: string
        field:
          type: string
        message:
          type: string

    ResponseResult:
      type: string
      enum:
        - success
        - error

    StockType:
      type: string
      enum:
        - SHARE
        - BOND

    StockId:
      type: object
      properties:
        value:
          type: string
          format: uuid

    StockPermission:
      type: string
      enum:
        - find
        - update
        - delete

    StockLock:
      type: string
      description: Optimistic lock version

    BaseStock:
      type: object
      description: Base object for create and update ops
      properties:
        name:
          type: string
        type:
          $ref: '#/components/schemas/StockType'

    StockResponseBody:
      allOf:
        - $ref: '#/components/schemas/BaseStock'
        - type: object
          properties:
            id:
              $ref: '#/components/schemas/StockId'
            userId:
              $ref: '#/components/schemas/UserId'
            lock:
              $ref: '#/components/schemas/StockLock'
            permissions:
              type: array
              uniqueItems: true
              items:
                $ref: '#/components/schemas/StockPermission'

    StockResponseSingle:
      allOf:
        - type: object
          description: Response with single item
          properties:
            stock:
              $ref: '#/components/schemas/StockResponseBody'

    StockResponseMultiple:
      allOf:
        - type: object
          description: Response with multiple item
          properties:
            stocks:
              type: array
              items:
                $ref: '#/components/schemas/StockResponseBody'

    CreateStockBody:
      allOf:
        - $ref: '#/components/schemas/BaseStock'

    DeleteStockBody:
      allOf:
        - type: object
          properties:
            id:
              $ref: '#/components/schemas/StockId'
            lock:
              $ref: '#/components/schemas/StockLock'

    FindStockBody:
      allOf:
        - $ref: '#/components/schemas/StockId'

    SearchStocksFilter:
      type: object
      properties:
        searchString:
          type: string

    UpdateStockBody:
      allOf:
        - $ref: '#/components/schemas/BaseStock'
        - type: object
          properties:
            id:
              $ref: '#/components/schemas/StockId'
            lock:
              $ref: '#/components/schemas/StockLock'

    Request:
      type: object
      description: Base interface for all requests
      properties:
        type:
          type: string
          description: field for understanding certain request type (kind of inheritor)
          example: create
      discriminator:
        propertyName: type
        mapping:
          create: '#/components/schemas/CreateStockRequest'
          find: '#/components/schemas/FindStockRequest'
          update: '#/components/schemas/UpdateStockRequest'
          delete: '#/components/schemas/DeleteStockRequest'
          search: '#/components/schemas/SearchStocksRequest'

    Response:
      type: object
      description: Base interface for all responses
      properties:
        type:
          type: string
          description: field for understanding certain response type (kind of inheritor)
          example: search
        result:
          $ref: '#/components/schemas/ResponseResult'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/Error'
      discriminator:
        propertyName: type
        mapping:
          create: '#/components/schemas/CreateStockResponse'
          find: '#/components/schemas/FindStockResponse'
          update: '#/components/schemas/UpdateStockResponse'
          delete: '#/components/schemas/DeleteStockResponse'
          search: '#/components/schemas/SearchStocksResponse'

    CreateStockRequest:
      allOf:
        - $ref: '#/components/schemas/BaseStock'
        - type: object
          properties:
            stock:
              $ref: '#/components/schemas/CreateStockBody'

    FindStockRequest:
      allOf:
        - $ref: '#/components/schemas/Request'
        - type: object
          properties:
            stock:
              $ref: '#/components/schemas/FindStockBody'

    UpdateStockRequest:
      allOf:
        - $ref: '#/components/schemas/Request'
        - type: object
          properties:
            ad:
              $ref: '#/components/schemas/UpdateStockBody'

    DeleteStockRequest:
      allOf:
        - $ref: '#/components/schemas/Request'
        - type: object
          properties:
            ad:
              $ref: '#/components/schemas/DeleteStockBody'

    SearchStocksRequest:
      allOf:
        - $ref: '#/components/schemas/Request'
        - type: object
          properties:
            filter:
              $ref: '#/components/schemas/SearchStocksFilter'

    CreateStockResponse:
      allOf:
        - $ref: '#/components/schemas/Response'
        - $ref: '#/components/schemas/StockResponseSingle'

    FindStockResponse:
      allOf:
        - $ref: '#/components/schemas/Response'
        - $ref: '#/components/schemas/StockResponseSingle'

    UpdateStockResponse:
      allOf:
        - $ref: '#/components/schemas/Response'
        - $ref: '#/components/schemas/StockResponseSingle'

    DeleteStockResponse:
      allOf:
        - $ref: '#/components/schemas/Response'
        - $ref: '#/components/schemas/StockResponseSingle'

    SearchStocksResponse:
      allOf:
        - $ref: '#/components/schemas/Response'
        - $ref: '#/components/schemas/StockResponseMultiple'
